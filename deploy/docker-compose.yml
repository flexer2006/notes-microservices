services:
  postgres-auth:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notes:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${NOTES_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTES_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTES_POSTGRES_DB}
    volumes:
      - postgres-notes-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTES_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: gateway
    environment:
      HTTP_HOST: ${GATEWAY_HTTP_HOST}
      HTTP_PORT: ${GATEWAY_HTTP_PORT}
      HTTP_READ_TIMEOUT: ${GATEWAY_HTTP_READ_TIMEOUT}
      HTTP_WRITE_TIMEOUT: ${GATEWAY_HTTP_WRITE_TIMEOUT}
      HTTP_SHUTDOWN_TIMEOUT: ${GATEWAY_HTTP_SHUTDOWN_TIMEOUT}
      GRACEFUL_SHUTDOWN_TIMEOUT: ${GATEWAY_GRACEFUL_SHUTDOWN_TIMEOUT}
      LOGGER_LEVEL: ${GATEWAY_LOGGER_LEVEL}
      LOGGER_MODE: ${GATEWAY_LOGGER_MODE}
      GRPC_AUTH_HOST: ${GATEWAY_GRPC_AUTH_HOST}
      GRPC_AUTH_PORT: ${GATEWAY_GRPC_AUTH_PORT}
      GRPC_NOTES_HOST: ${GATEWAY_GRPC_NOTES_HOST}
      GRPC_NOTES_PORT: ${GATEWAY_GRPC_NOTES_PORT}
      REDIS_HOST: ${GATEWAY_REDIS_HOST}
      REDIS_PORT: ${GATEWAY_REDIS_PORT}
      REDIS_PASSWORD: ${GATEWAY_REDIS_PASSWORD}
      REDIS_DB: ${GATEWAY_REDIS_DB}
      REDIS_CONNECT_TIMEOUT: ${GATEWAY_REDIS_CONNECT_TIMEOUT}
      REDIS_READ_TIMEOUT: ${GATEWAY_REDIS_READ_TIMEOUT}
      REDIS_WRITE_TIMEOUT: ${GATEWAY_REDIS_WRITE_TIMEOUT}
      REDIS_POOL_SIZE: ${GATEWAY_REDIS_POOL_SIZE}
      REDIS_MIN_IDLE: ${GATEWAY_REDIS_MIN_IDLE}
      REDIS_IDLE_TIMEOUT: ${GATEWAY_REDIS_IDLE_TIMEOUT}
      REDIS_MAX_CONN_LIFETIME: ${GATEWAY_REDIS_MAX_CONN_LIFETIME}
      REDIS_DEFAULT_TTL: ${GATEWAY_REDIS_DEFAULT_TTL}
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
      notes:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${GATEWAY_HTTP_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth:
    build:
      context: ../
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: auth
    environment:
      POSTGRES_HOST: ${AUTH_POSTGRES_HOST}
      POSTGRES_PORT: ${AUTH_POSTGRES_PORT}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_MIN_CONN: ${AUTH_POSTGRES_MIN_CONN}
      POSTGRES_MAX_CONN: ${AUTH_POSTGRES_MAX_CONN}
      GRACEFUL_SHUTDOWN_TIMEOUT: ${AUTH_GRACEFUL_SHUTDOWN_TIMEOUT}
      LOGGER_LEVEL: ${AUTH_LOGGER_LEVEL}
      LOGGER_MODE: ${AUTH_LOGGER_MODE}
      GRPC_HOST: ${AUTH_GRPC_HOST}
      GRPC_PORT: ${AUTH_GRPC_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      JWT_BCRYPT_COST: ${JWT_BCRYPT_COST}
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${AUTH_GRPC_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 5

  notes:
    build:
      context: ../
      dockerfile: deploy/go.Dockerfile
      args:
        SERVICE: notes
    environment:
      POSTGRES_HOST: ${NOTES_POSTGRES_HOST}
      POSTGRES_PORT: ${NOTES_POSTGRES_PORT}
      POSTGRES_USER: ${NOTES_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTES_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTES_POSTGRES_DB}
      POSTGRES_MIN_CONN: ${NOTES_POSTGRES_MIN_CONN}
      POSTGRES_MAX_CONN: ${NOTES_POSTGRES_MAX_CONN}
      GRACEFUL_SHUTDOWN_TIMEOUT: ${NOTES_GRACEFUL_SHUTDOWN_TIMEOUT}
      LOGGER_LEVEL: ${NOTES_LOGGER_LEVEL}
      LOGGER_MODE: ${NOTES_LOGGER_MODE}
      GRPC_HOST: ${NOTES_GRPC_HOST}
      GRPC_PORT: ${NOTES_GRPC_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL}
      JWT_BCRYPT_COST: ${JWT_BCRYPT_COST}
    depends_on:
      postgres-notes:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${NOTES_GRPC_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.29.6-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-notes-data:
  redis-data: