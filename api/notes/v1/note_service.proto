syntax = "proto3";

package notes.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";

option go_package = "github.com/flexer2006/notes-microservices/gen/notes/v1;notesv1";

service NoteService {
  rpc CreateNote(CreateNoteRequest) returns (NoteResponse) {
    option (google.api.http) = {
      post: "/api/v1/notes"
      body: "*"
    };
  }

  rpc GetNote(GetNoteRequest) returns (NoteResponse) {
    option (google.api.http) = {
      get: "/api/v1/notes/{note_id}"
    };
  }

  rpc ListNotes(ListNotesRequest) returns (ListNotesResponse) {
    option (google.api.http) = {
      get: "/api/v1/notes"
    };
  }

  rpc UpdateNote(UpdateNoteRequest) returns (NoteResponse) {
    option (google.api.http) = {
      patch: "/api/v1/notes/{note_id}"
      body: "*"
    };
  }

  rpc DeleteNote(DeleteNoteRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/notes/{note_id}"
    };
  }
}

message CreateNoteRequest {
  string title = 1;
  string content = 2;
}

message GetNoteRequest {
  string note_id = 1;
}

message ListNotesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListNotesResponse {
  repeated Note notes = 1;
  int32 total_count = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message UpdateNoteRequest {
  string note_id = 1;
  optional string title = 2;
  optional string content = 3;
}

message DeleteNoteRequest {
  string note_id = 1;
}

message Note {
  string note_id = 1;
  string user_id = 2;
  string title = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message NoteResponse {
  Note note = 1;
}